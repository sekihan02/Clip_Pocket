name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Compile source
        shell: python
        run: |
          import compileall
          import sys

          ok = compileall.compile_dir("src", quiet=1)
          ok = compileall.compile_file("tools/build_exe.py", quiet=1) and ok
          raise SystemExit(0 if ok else 1)
